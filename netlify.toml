# Build settings for Netlify
[build]
  command = "pnpm build"
  publish = "dist/gastos-frontend"

# Redirect all SPA requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy API requests to backend
[[redirects]]
  from = "/api/*"
  to = "https://gastos-backend-production.herokuapp.com/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
